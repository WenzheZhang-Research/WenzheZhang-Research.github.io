<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重要日程倒计时</title>
    <meta name="description" content="简约美观的每日重要事件倒计时网站，支持提醒、日期展示和农历。">
    <meta name="theme-color" content="#17211e">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ambient ambient-a"></div>
    <div class="ambient ambient-b"></div>

    <main class="page">
        <section class="hero-card">
            <div class="hero-copy">
                <p class="eyebrow">Daily Focus</p>
                <h1>重要事件倒计时</h1>
                <p class="hero-text">
                    用一个安静清晰的页面，把真正重要的事情放到每天都能看见的位置。
                </p>
            </div>
            <div class="date-panel">
                <p class="date-label">今日日期</p>
                <h2 id="solarDate">--</h2>
                <p id="weekdayText">--</p>
                <p id="lunarDate" class="lunar-text">农历 --</p>
                <p id="clockText" class="clock-text">--:--:--</p>
            </div>
        </section>

        <section class="layout-grid">
            <section class="panel spotlight-panel">
                <div class="panel-head">
                    <div>
                        <p class="panel-kicker">Next Deadline</p>
                        <h2>最近的重要事件</h2>
                    </div>
                </div>
                <div id="emptyState" class="empty-state">
                    <p>还没有事件。先在右侧添加一个目标日期。</p>
                </div>
                <article id="featuredEvent" class="featured-event hidden">
                    <div class="featured-topline">
                        <p id="featuredTag" class="event-tag">重要</p>
                        <p id="featuredReminder" class="reminder-note">提醒未开启</p>
                    </div>
                    <h3 id="featuredTitle">事件标题</h3>
                    <p id="featuredDesc" class="featured-desc"></p>
                    <div class="countdown-grid">
                        <div>
                            <span id="daysValue">0</span>
                            <small>天</small>
                        </div>
                        <div>
                            <span id="hoursValue">0</span>
                            <small>小时</small>
                        </div>
                        <div>
                            <span id="minutesValue">0</span>
                            <small>分钟</small>
                        </div>
                    </div>
                    <div class="featured-meta">
                        <p id="featuredTarget">目标日期：--</p>
                        <p id="featuredStatus">状态：--</p>
                    </div>
                </article>
            </section>

            <section class="panel form-panel">
                <div class="panel-head">
                    <div>
                        <p class="panel-kicker">Manage Events</p>
                        <h2>添加重要事项</h2>
                    </div>
                    <button id="notifyBtn" class="ghost-btn" type="button">开启提醒权限</button>
                </div>

                <form id="eventForm" class="event-form">
                    <input id="editIdInput" type="hidden">
                    <label>
                        事件名称
                        <input id="titleInput" type="text" maxlength="40" placeholder="例如：CSC 材料提交" required>
                    </label>
                    <label>
                        事件描述
                        <textarea id="descInput" rows="3" maxlength="120" placeholder="简要记录这件事为什么重要"></textarea>
                    </label>
                    <div class="form-row">
                        <label>
                            日期
                            <input id="dateInput" type="date" required>
                        </label>
                        <label>
                            时间
                            <input id="timeInput" type="time" value="09:00">
                        </label>
                    </div>
                    <div class="form-row">
                        <label>
                            分类
                            <select id="categoryInput">
                                <option value="学业">学业</option>
                                <option value="申请">申请</option>
                                <option value="工作">工作</option>
                                <option value="生活">生活</option>
                                <option value="其他">其他</option>
                            </select>
                        </label>
                        <label>
                            颜色标签
                            <select id="colorInput">
                                <option value="green">松绿</option>
                                <option value="amber">琥珀</option>
                                <option value="rose">玫瑰</option>
                                <option value="slate">岩灰</option>
                                <option value="violet">紫灰</option>
                            </select>
                        </label>
                    </div>
                    <div class="form-row">
                        <label>
                            提前提醒
                            <select id="reminderInput">
                                <option value="0">不提醒</option>
                                <option value="10">提前 10 分钟</option>
                                <option value="30">提前 30 分钟</option>
                                <option value="60">提前 1 小时</option>
                                <option value="1440">提前 1 天</option>
                            </select>
                        </label>
                        <label>
                            完成状态
                            <select id="completedInput">
                                <option value="false">未完成</option>
                                <option value="true">已完成</option>
                            </select>
                        </label>
                    </div>
                    <div class="form-actions">
                        <button id="submitBtn" class="primary-btn" type="submit">保存事件</button>
                        <button id="cancelEditBtn" class="ghost-btn hidden" type="button">取消编辑</button>
                    </div>
                </form>
            </section>
        </section>

        <section class="panel calendar-panel">
            <div class="panel-head">
                <div>
                    <p class="panel-kicker">Calendar Views</p>
                    <h2>日视图与周视图</h2>
                </div>
                <div class="view-switcher">
                    <button class="ghost-btn active-view" type="button" data-view="day">今日</button>
                    <button class="ghost-btn" type="button" data-view="week">本周</button>
                </div>
            </div>
            <div id="calendarSummary" class="calendar-summary"></div>
            <div id="calendarList" class="calendar-list"></div>
        </section>

        <section class="panel list-panel">
            <div class="panel-head">
                <div>
                    <p class="panel-kicker">Timeline</p>
                    <h2>所有事件</h2>
                </div>
            </div>
            <div id="eventList" class="event-list"></div>
        </section>
    </main>

    <template id="eventItemTemplate">
        <article class="event-item">
            <div class="event-main">
                <div class="event-heading-row">
                    <p class="event-chip"></p>
                    <p class="event-count"></p>
                </div>
                <h3 class="event-title"></h3>
                <p class="event-description"></p>
                <div class="event-meta-row">
                    <span class="event-target"></span>
                    <span class="event-reminder"></span>
                    <span class="event-state"></span>
                </div>
            </div>
            <div class="event-actions">
                <button class="icon-btn complete-btn" type="button">完成</button>
                <button class="icon-btn edit-btn" type="button">编辑</button>
                <button class="icon-btn delete-btn" type="button">删除</button>
            </div>
        </article>
    </template>

    <script src="script.js"></script>
</body>
</html>
