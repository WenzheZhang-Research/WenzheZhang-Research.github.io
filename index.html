<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wenzhe Zhang</title>
    <meta name="description" content="Personal site entry for memo and academic CV.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #223044;
            --muted: #6e7f96;
            --line: rgba(108, 137, 173, 0.14);
            --card: rgba(255,255,255,0.78);
            --shadow: 0 24px 70px rgba(122, 151, 189, 0.12);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Outfit", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(210, 227, 251, 0.75), transparent 28%),
                radial-gradient(circle at bottom right, rgba(235, 243, 255, 0.92), transparent 30%),
                linear-gradient(180deg, #f9fbff 0%, #eef5ff 100%);
            display: grid;
            place-items: center;
            padding: 24px;
        }
        .shell {
            width: min(980px, 100%);
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.8);
            border-radius: 32px;
            box-shadow: var(--shadow);
            padding: 40px;
            backdrop-filter: blur(16px);
        }
        .eyebrow {
            margin: 0 0 12px;
            font-size: 12px;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: #7697c5;
        }
        h1, h2 {
            font-family: "Noto Serif SC", serif;
            margin: 0;
            font-weight: 600;
        }
        h1 {
            font-size: clamp(38px, 6vw, 60px);
            margin-bottom: 14px;
        }
        .intro {
            color: var(--muted);
            font-size: 17px;
            line-height: 1.9;
            max-width: 42rem;
            margin-bottom: 28px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 18px;
        }
        .card {
            display: block;
            text-decoration: none;
            color: inherit;
            background: rgba(255,255,255,0.82);
            border: 1px solid var(--line);
            border-radius: 24px;
            padding: 24px;
            transition: transform 180ms ease, box-shadow 180ms ease;
            box-shadow: 0 18px 46px rgba(135, 161, 196, 0.08);
        }
        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 24px 56px rgba(135, 161, 196, 0.14);
        }
        .card p {
            margin: 10px 0 0;
            color: var(--muted);
            line-height: 1.8;
        }
        @media (max-width: 720px) {
            .shell { padding: 24px; border-radius: 24px; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <main class="shell">
        <p class="eyebrow">Wenzhe Zhang</p>
        <h1>Personal Site</h1>
        <p class="intro">这里是当前个人网站入口，你可以直接进入日常使用的哲哲备忘录。</p>
        <section class="grid">
            <a class="card" href="/memo/">
                <p class="eyebrow">Memo</p>
                <h2>哲哲备忘录</h2>
                <p>进入每日倒计时、提醒、日视图与周视图，以及可安装的本地桌面/PWA 版本。</p>
            </a>
        </section>
    </main>
</body>
</html>
